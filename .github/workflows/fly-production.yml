name: Fly Production

on:
  push:
    branches:
      - release
    paths:
      - ".github/workflows/fly-production.yml"
      - "pipeline/**"
  workflow_dispatch:

concurrency:
  group: fly-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy production pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --config fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
