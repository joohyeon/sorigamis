app = "sorigamis"
primary_region = "nrt"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[env]
  HERMES_MODEL = "gemini-2.5-pro"
  HERMES_PROVIDER = "github-copilot"
  # hermes is installed into /usr/local/bin by pip — already on PATH in slim image.
  # Secrets required (set via `fly secrets set`):
  #   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
  #   GOOGLE_SERVICE_ACCOUNT_JSON
  #   FCM_SERVER_KEY
  #   MODAL_TOKEN_ID, MODAL_TOKEN_SECRET
  #   GITHUB_TOKEN  ← required by --provider github-copilot

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
