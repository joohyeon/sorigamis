app = "sg-pipeline"
primary_region = "nrt"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[env]
  HERMES_MODEL = "gemini-2.5-pro"
  HERMES_PROVIDER = "github-copilot"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
